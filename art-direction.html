function useInView(t = 0.1) {
  const ref = useRef(null);
  const [v, setV] = useState(false);
  useEffect(() => {
    const o = new IntersectionObserver(([e]) => { if (e.isIntersecting) setV(true); }, { threshold: t });
    if (ref.current) o.observe(ref.current);
    return () => o.disconnect();
  }, []);
  return [ref, v];
}

function FadeIn({ children, delay = 0, style = {} }) {
  const [ref, v] = useInView();
  return (
    <div ref={ref} style={{ opacity: v ? 1 : 0, transform: v ? "none" : "translateY(20px)", transition: `opacity .7s ease ${delay}s, transform .7s ease ${delay}s`, ...style }}>
      {children}
    </div>
  );
}

function Tag({ children, color = C.magentaDeep }) {
  return (
    <span style={{ fontFamily: "Georgia, serif", fontSize: "0.68rem", letterSpacing: "0.1em", textTransform: "uppercase", color, border: `1px solid ${color}44`, padding: "0.25rem 0.7rem" }}>
      {children}
    </span>
  );
}

// ─── Decision tree ───────────────────────────────────────────────────────────
function TreePage({ onNavigate }) {
  const [answers, setAnswers] = useState({});
  const [result, setResult] = useState(null);
  const [history, setHistory] = useState(["q1"]);
  const [hovered, setHovered] = useState(null);

  const currentQ = QUESTIONS.find(q => q.id === history[history.length - 1]);
  const progress = result ? 100 : Math.round(((history.length - 1) / 2) * 100);

  const handleAnswer = (value) => {
    setAnswers(a => ({ ...a, [currentQ.id]: value }));
    const isMovement = MOVEMENTS[value] !== undefined;
    const isHybrid = HYBRIDS[value] !== undefined;
    if (isMovement || isHybrid) setResult(value);
    else setHistory(h => [...h, value]);
  };

  const reset = () => { setAnswers({}); setResult(null); setHistory(["q1"]); };
  const goBack = () => { if (result) setResult(null); else if (history.length > 1) setHistory(h => h.slice(0, -1)); };

  return (
    <div style={{ background: C.lightGray, minHeight: "100vh" }}>
      <div style={{ maxWidth: "860px", margin: "0 auto", padding: "6rem 4rem" }}>

        {/* Progress */}
        <div style={{ marginBottom: "4rem" }}>
          <div style={{ display: "flex", justifyContent: "space-between", marginBottom: "0.6rem" }}>
            <div style={{ fontFamily: "Georgia, serif", fontSize: "0.7rem", letterSpacing: "0.15em", textTransform: "uppercase", color: C.bodyText, fontStyle: "italic" }}>Question {history.length} of 2</div>
            <div style={{ fontFamily: "Georgia, serif", fontSize: "0.7rem", letterSpacing: "0.15em", textTransform: "uppercase", color: C.magentaDeep, fontStyle: "italic" }}>{progress}%</div>
          </div>
          <div style={{ width: "100%", height: "2px", background: `${C.magenta}20` }}>
            <div style={{ width: `${progress}%`, height: "100%", background: C.magenta, transition: "width 0.5s ease" }} />
          </div>
        </div>

        {result ? (
          /* Result */
          <div>
            <div style={{ fontFamily: "Georgia, serif", fontSize: "0.75rem", letterSpacing: "0.2em", textTransform: "uppercase", color: C.magentaDeep, fontStyle: "italic", marginBottom: "1.5rem" }}>Your Art Direction</div>
            {(() => {
              const m = MOVEMENTS[result];
              const h = HYBRIDS[result];
              return (
                <div>
                  <div style={{ background: m ? m.accentColor : C.cardBg2, padding: "3rem", marginBottom: "2rem" }}>
                    <div style={{ fontFamily: "'Anton', Impact, sans-serif", fontSize: "clamp(2.5rem,5vw,5rem)", textTransform: "uppercase", color: m ? m.accentText : C.primaryText, lineHeight: 0.9, marginBottom: "1rem" }}>
                      {m ? m.name : h.name}
                    </div>
                    <p style={{ fontFamily: "Georgia, serif", fontSize: "1rem", lineHeight: 1.8, color: m ? `${m.accentText}cc` : C.bodyText, margin: 0 }}>
                      {m ? m.core : h.desc}
                    </p>
                  </div>
                  <div style={{ display: "flex", gap: "1rem", flexWrap: "wrap" }}>
                    {m && (
                      <button onClick={() => onNavigate(result)}
                        style={{ fontFamily: "'Anton', Impact, sans-serif", fontSize: "0.9rem", letterSpacing: "0.1em", textTransform: "uppercase", padding: "1rem 2.5rem", background: C.magenta, color: C.primaryText, border: "none", cursor: "pointer", transition: "transform 0.2s, box-shadow 0.2s" }}
                        onMouseEnter={e => { e.target.style.transform = "translate(-3px,-3px)"; e.target.style.boxShadow = `5px 5px 0 ${C.primaryText}`; }}
                        onMouseLeave={e => { e.target.style.transform = "none"; e.target.style.boxShadow = "none"; }}
                      >Explore {m.name} →</button>
                    )}
                    <button onClick={reset}
                      style={{ fontFamily: "Georgia, serif", fontSize: "0.9rem", fontStyle: "italic", padding: "1rem 2rem", background: "transparent", color: C.bodyText, border: `1px solid ${C.bodyText}44`, cursor: "pointer" }}>
                      Start Over
                    </button>
                  </div>
                </div>
              );
            })()}
          </div>
        ) : currentQ ? (
          /* Question */
          <div>
            <h2 style={{ fontFamily: "'Anton', Impact, sans-serif", fontSize: "clamp(1.8rem,4vw,3.5rem)", textTransform: "uppercase", lineHeight: 0.95, color: C.primaryText, margin: "0 0 0.8rem 0" }}>
              {currentQ.question}
            </h2>
            <p style={{ fontFamily: "Georgia, serif", fontSize: "0.9rem", fontStyle: "italic", color: C.bodyText, margin: "0 0 3rem 0" }}>{currentQ.sub}</p>
            <div style={{ display: "flex", flexDirection: "column", gap: "3px", background: `${C.magenta}15` }}>
              {currentQ.options.map((opt, i) => (
                <button key={opt.value}
                  onClick={() => handleAnswer(opt.value)}
                  onMouseEnter={() => setHovered(opt.value)}
                  onMouseLeave={() => setHovered(null)}
                  style={{ display: "flex", alignItems: "center", gap: "1.5rem", padding: "1.8rem 2rem", background: hovered === opt.value ? `${C.magenta}10` : C.lightGray, border: "none", borderLeft: `3px solid ${hovered === opt.value ? C.magenta : "transparent"}`, cursor: "pointer", transition: "all 0.2s", textAlign: "left" }}
                >
                  <div style={{ fontFamily: "'Anton', Impact, sans-serif", fontSize: "1.5rem", color: `${C.magenta}${hovered === opt.value ? "cc" : "33"}`, lineHeight: 1, minWidth: "2rem", textAlign: "center", transition: "color 0.2s" }}>
                    {String.fromCharCode(65 + i)}
                  </div>
                  <span style={{ fontFamily: "Georgia, serif", fontSize: "1rem", lineHeight: 1.6, color: hovered === opt.value ? C.primaryText : C.bodyText, transition: "color 0.2s" }}>{opt.label}</span>
                  <div style={{ marginLeft: "auto", opacity: hovered === opt.value ? 1 : 0, transition: "opacity 0.2s", color: C.magenta, fontSize: "1.1rem" }}>→</div>
                </button>
              ))}
            </div>
            {history.length > 1 && (
              <button onClick={goBack} style={{ marginTop: "2rem", fontFamily: "Georgia, serif", fontSize: "0.82rem", fontStyle: "italic", color: C.bodyText, background: "transparent", border: "none", cursor: "pointer", padding: 0 }}>
                ← Back
              </button>
            )}
          </div>
        ) : null}
      </div>
    </div>
  );
}

// ─── Root app with nav ────────────────────────────────────────────────────────
function App() {
  const [view, setView] = useState("overview"); // overview | tree | movement:{id}
  const [scrolled, setScrolled] = useState(false);

  useEffect(() => {
    const h = () => setScrolled(window.scrollY > 40);
    window.addEventListener("scroll", h);
    return () => window.removeEventListener("scroll", h);
  }, []);

  const navigate = (id) => { setView(`movement:${id}`); };
  const goBack = () => setView("overview");

  const currentMovementId = view.startsWith("movement:") ? view.replace("movement:", "") : null;

  return (
    <div>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Anton&display=swap');
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }
        body { background: ${C.lightGray}; }
        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-track { background: ${C.lightGray}; }
        ::-webkit-scrollbar-thumb { background: ${C.magenta}; }
        button { font-family: inherit; }
      `}</style>

      {/* Sticky nav */}
      <nav style={{ position: "sticky", top: 0, zIndex: 100, padding: "1.2rem 4rem", display: "flex", justifyContent: "space-between", alignItems: "center", background: scrolled ? `${C.lightGray}` : C.lightGray, backdropFilter: scrolled ? "blur(12px)" : "none", borderBottom: `1px solid ${C.divider}`, transition: "all 0.3s" }}>
        <button onClick={() => setView("overview")} style={{ background: "none", border: "none", cursor: "pointer", padding: 0, textAlign: "left" }}>
          <div style={{ fontFamily: "'Anton', Impact, sans-serif", fontSize: "0.9rem", letterSpacing: "0.1em", textTransform: "uppercase", color: C.primaryText }}>Shannon Reibenstein Co.</div>
          <div style={{ fontFamily: "Georgia, serif", fontSize: "0.68rem", fontStyle: "italic", color: C.magentaDeep, marginTop: "0.1rem" }}>Art Direction Reference</div>
        </button>

        <div style={{ display: "flex", gap: "0.5rem", alignItems: "center" }}>
          <a href="https://shannon-reibenstein-co.vercel.app" style={{ fontFamily: "Georgia, serif", fontSize: "0.78rem", fontStyle: "italic", color: "C.bodyText", textDecoration: "none", padding: "0.5rem 1rem", border: "1px solid #2F364C33", color: "#2F364C", marginRight: "0.5rem", transition: "all 0.2s" }}
            onMouseEnter={e => e.target.style.borderColor = "#FC19E5"}
            onMouseLeave={e => e.target.style.borderColor = "#2F364C33"}
          >← Site</a>
          {[
            { label: "Overview", v: "overview" },
            { label: "Decision Tree", v: "tree" },
          ].map(({ label, v }) => (
            <button key={v} onClick={() => setView(v)}
              style={{ fontFamily: "Georgia, serif", fontSize: "0.8rem", fontStyle: "italic", padding: "0.5rem 1.2rem", background: view === v ? `${C.magenta}15` : "transparent", color: view === v ? C.magenta : C.bodyText, border: `1px solid ${view === v ? C.magenta : `${C.bodyText}33`}`, cursor: "pointer", transition: "all 0.2s" }}>
              {label}
            </button>
          ))}
          {currentMovementId && MOVEMENTS[currentMovementId] && (
            <span style={{ fontFamily: "Georgia, serif", fontSize: "0.8rem", fontStyle: "italic", padding: "0.5rem 1.2rem", color: C.primaryText, border: `1px solid ${C.magenta}`, background: `${C.magenta}08` }}>
              {MOVEMENTS[currentMovementId].name}
            </span>
          )}
        </div>
      </nav>

      {/* Content */}
      {view === "overview" && <OverviewPage onNavigate={navigate} />}
      {view === "tree" && <TreePage onNavigate={navigate} />}
      {currentMovementId && <MovementPage id={currentMovementId} onBack={goBack} onNavigate={navigate} />}

      {/* Footer */}
      <footer style={{ padding: "2.5rem 4rem", borderTop: `1px solid ${C.divider}`, display: "flex", justifyContent: "space-between", alignItems: "center", background: C.lightGray }}>
        <div style={{ fontFamily: "'Anton', Impact, sans-serif", fontSize: "0.85rem", letterSpacing: "0.1em", textTransform: "uppercase", color: C.primaryText }}>Shannon Reibenstein Co.</div>
        <div style={{ fontFamily: "Georgia, serif", fontSize: "0.78rem", fontStyle: "italic", color: C.magentaDeep }}>Possibilitarian For Hire</div>
      </footer>
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
</html>

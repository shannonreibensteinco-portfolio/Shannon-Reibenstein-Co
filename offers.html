function useInView(threshold = 0.12) {
  const ref = useRef(null);
  const [inView, setInView] = useState(false);
  useEffect(() => {
    const observer = new IntersectionObserver(
      ([entry]) => { if (entry.isIntersecting) setInView(true); },
      { threshold }
    );
    if (ref.current) observer.observe(ref.current);
    return () => observer.disconnect();
  }, []);
  return [ref, inView];
}

function FadeIn({ children, delay = 0, style = {} }) {
  const [ref, inView] = useInView();
  return (
    <div ref={ref} style={{
      opacity: inView ? 1 : 0,
      transform: inView ? "translateY(0)" : "translateY(28px)",
      transition: `opacity 0.85s ease ${delay}s, transform 0.85s ease ${delay}s`,
      ...style,
    }}>
      {children}
    </div>
  );
}

function Process() {
  const steps = [
    { n: "01", title: "Inquiry", body: "Fill out the form below. Tell me about your brand in one sentence and what's most frustrating about your current messaging. I read every submission personally." },
    { n: "02", title: "Discovery Call", body: "A 45-minute conversation where I ask the questions that get underneath the surface of your brand. No pitch. No pressure. Just an honest conversation about where you are and what's possible." },
    { n: "03", title: "Proposal", body: "I send a custom proposal — scope, timeline, investment — built specifically for your situation. Not a menu. A recommendation." },
    { n: "04", title: "The Work", body: "We build your brand atmosphere together. You bring the truth of who you are. I bring the language and visual thinking that makes it impossible to ignore." },
  ];

  return (
    <section style={{ background: COLORS.offWhite, padding: "9rem 4rem" }}>
      <div style={{ maxWidth: "1100px", margin: "0 auto" }}>
        <FadeIn>
          <div style={{ display: "flex", alignItems: "baseline", gap: "1.5rem", marginBottom: "5rem" }}>
            <span style={{
              fontFamily: "Georgia, serif", fontSize: "0.75rem",
              letterSpacing: "0.2em", textTransform: "uppercase",
              color: COLORS.magentaDeep, fontStyle: "italic",
            }}>How it works</span>
            <div style={{ flex: 1, height: "1px", background: `${COLORS.navy}22` }} />
          </div>
        </FadeIn>

        <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: "2px", background: `${COLORS.navy}11` }}>
          {steps.map((s, i) => (
            <FadeIn key={i} delay={i * 0.1}>
              <div style={{
                background: COLORS.offWhite, padding: "3rem 2rem",
                borderTop: "3px solid transparent", transition: "border-color 0.3s",
              }}
                onMouseEnter={e => e.currentTarget.style.borderTopColor = COLORS.magenta}
                onMouseLeave={e => e.currentTarget.style.borderTopColor = "transparent"}
              >
                <div style={{
                  fontFamily: "\'Anton\', Impact, sans-serif",
                  fontSize: "3rem", color: `${COLORS.navy}12`,
                  lineHeight: 1, marginBottom: "1.2rem",
                }}>{s.n}</div>
                <h3 style={{
                  fontFamily: "\'Anton\', Impact, sans-serif",
                  fontSize: "1.1rem", textTransform: "uppercase",
                  letterSpacing: "0.03em", color: COLORS.nearBlack,
                  margin: "0 0 1rem 0",
                }}>{s.title}</h3>
                <p style={{
                  fontFamily: "Georgia, serif", fontSize: "0.9rem",
                  lineHeight: 1.75, color: `${COLORS.nearBlack}77`, margin: 0,
                }}>{s.body}</p>
              </div>
            </FadeIn>
          ))}
        </div>
      </div>
    </section>
  );
}

function InquiryForm() {
  const [formData, setFormData] = useState({
    name: "", email: "", brandSentence: "",
    frustration: "", budget: "", timeline: "",
  });
  const [submitted, setSubmitted] = useState(false);

  const handleSubmit = () => {
    if (formData.name && formData.email && formData.brandSentence) {
      setSubmitted(true);
    }
  };

  const inputStyle = {
    width: "100%", padding: "1rem 1.2rem",
    background: `${COLORS.navy}40`,
    border: `1px solid ${COLORS.magenta}30`,
    color: COLORS.offWhite,
    fontFamily: "Georgia, serif", fontSize: "0.95rem",
    outline: "none", transition: "border-color 0.2s",
    lineHeight: 1.5,
  };

  const labelStyle = {
    fontFamily: "Georgia, serif", fontSize: "0.72rem",
    letterSpacing: "0.15em", textTransform: "uppercase",
    color: COLORS.magentaSoft, display: "block",
    marginBottom: "0.6rem",
  };

  return (
    <section id="inquiry" style={{ background: COLORS.nearBlack, padding: "9rem 4rem" }}>
      <div style={{ maxWidth: "800px", margin: "0 auto" }}>
        <FadeIn>
          <p style={{
            fontFamily: "Georgia, serif", fontSize: "0.75rem",
            letterSpacing: "0.2em", textTransform: "uppercase",
            color: COLORS.magentaSoft, fontStyle: "italic",
            marginBottom: "2rem",
          }}>Start the conversation</p>
        </FadeIn>

        <FadeIn delay={0.1}>
          <h2 style={{
            fontFamily: "\'Anton\', Impact, sans-serif",
            fontSize: "clamp(2.5rem, 5vw, 5.5rem)",
            lineHeight: 0.92, textTransform: "uppercase",
            color: COLORS.offWhite, margin: "0 0 1.5rem 0",
          }}>
            Tell Me<br />
            About Your<br />
            <span style={{ color: COLORS.magenta }}>Brand.</span>
          </h2>
        </FadeIn>

        <FadeIn delay={0.2}>
          <p style={{
            fontFamily: "Georgia, serif", fontSize: "1rem", lineHeight: 1.75,
            color: "#B3A6A7", margin: "0 0 4rem 0",
          }}>
            No pitch decks. No portfolio reviews before we talk. Just tell me what's happening and let's figure out together whether we're the right fit.
          </p>
        </FadeIn>

        {submitted ? (
          <FadeIn>
            <div style={{
              padding: "4rem", background: `${COLORS.navy}60`,
              borderLeft: `3px solid ${COLORS.magenta}`,
              textAlign: "center",
            }}>
              <div style={{
                fontFamily: "\'Anton\', Impact, sans-serif",
                fontSize: "2rem", textTransform: "uppercase",
                color: COLORS.magenta, marginBottom: "1rem",
              }}>Got it.</div>
              <p style={{
                fontFamily: "Georgia, serif", fontSize: "1.05rem",
                lineHeight: 1.75, color: "#B3A6A7", margin: 0,
              }}>
                I read every submission personally. You'll hear from me within 48 hours — usually sooner. In the meantime, take a look at the work.
              </p>
            </div>
          </FadeIn>
        ) : (
          <FadeIn delay={0.3}>
            <div style={{ display: "flex", flexDirection: "column", gap: "2rem" }}>
              {/* Name + Email */}
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "1.5rem" }}>
                <div>
                  <label style={labelStyle}>Your Name *</label>
                  <input
                    type="text" placeholder="First and last"
                    value={formData.name}
                    onChange={e => setFormData({...formData, name: e.target.value})}
                    style={inputStyle}
                    onFocus={e => e.target.style.borderColor = COLORS.magenta}
                    onBlur={e => e.target.style.borderColor = `${COLORS.magenta}30`}
                  />
                </div>
                <div>
                  <label style={labelStyle}>Your Email *</label>
                  <input
                    type="email" placeholder="Where to reach you"
                    value={formData.email}
                    onChange={e => setFormData({...formData, email: e.target.value})}
                    style={inputStyle}
                    onFocus={e => e.target.style.borderColor = COLORS.magenta}
                    onBlur={e => e.target.style.borderColor = `${COLORS.magenta}30`}
                  />
                </div>
              </div>

              {/* Brand sentence */}
              <div>
                <label style={labelStyle}>Tell me about your brand in one sentence *</label>
                <input
                  type="text" placeholder="Don't overthink it — the first honest thing that comes to mind"
                  value={formData.brandSentence}
                  onChange={e => setFormData({...formData, brandSentence: e.target.value})}
                  style={inputStyle}
                  onFocus={e => e.target.style.borderColor = COLORS.magenta}
                  onBlur={e => e.target.style.borderColor = `${COLORS.magenta}30`}
                />
              </div>

              {/* Frustration */}
              <div>
                <label style={labelStyle}>What's the most frustrating thing about your current brand or messaging?</label>
                <textarea
                  rows={4}
                  placeholder="This is where the real conversation starts. Be honest."
                  value={formData.frustration}
                  onChange={e => setFormData({...formData, frustration: e.target.value})}
                  style={{ ...inputStyle, resize: "vertical" }}
                  onFocus={e => e.target.style.borderColor = COLORS.magenta}
                  onBlur={e => e.target.style.borderColor = `${COLORS.magenta}30`}
                />
              </div>

              {/* Budget + Timeline */}
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "1.5rem" }}>
                <div>
                  <label style={labelStyle}>Approximate Budget Range</label>
                  <select
                    value={formData.budget}
                    onChange={e => setFormData({...formData, budget: e.target.value})}
                    style={{ ...inputStyle, cursor: "pointer" }}
                    onFocus={e => e.target.style.borderColor = COLORS.magenta}
                    onBlur={e => e.target.style.borderColor = `${COLORS.magenta}30`}
                  >
                    <option value="" style={{ background: COLORS.nearBlack }}>Select a range</option>
                    <option value="under2k" style={{ background: COLORS.nearBlack }}>Under $2,000</option>
                    <option value="2-5k" style={{ background: COLORS.nearBlack }}>$2,000 – $5,000</option>
                    <option value="5-10k" style={{ background: COLORS.nearBlack }}>$5,000 – $10,000</option>
                    <option value="10-20k" style={{ background: COLORS.nearBlack }}>$10,000 – $20,000</option>
                    <option value="20k+" style={{ background: COLORS.nearBlack }}>$20,000+</option>
                    <option value="flexible" style={{ background: COLORS.nearBlack }}>Flexible — let's talk</option>
                  </select>
                </div>
                <div>
                  <label style={labelStyle}>Ideal Timeline</label>
                  <select
                    value={formData.timeline}
                    onChange={e => setFormData({...formData, timeline: e.target.value})}
                    style={{ ...inputStyle, cursor: "pointer" }}
                    onFocus={e => e.target.style.borderColor = COLORS.magenta}
                    onBlur={e => e.target.style.borderColor = `${COLORS.magenta}30`}
                  >
                    <option value="" style={{ background: COLORS.nearBlack }}>When do you need this?</option>
                    <option value="asap" style={{ background: COLORS.nearBlack }}>As soon as possible</option>
                    <option value="1month" style={{ background: COLORS.nearBlack }}>Within 1 month</option>
                    <option value="1-3months" style={{ background: COLORS.nearBlack }}>1 – 3 months</option>
                    <option value="3-6months" style={{ background: COLORS.nearBlack }}>3 – 6 months</option>
                    <option value="planning" style={{ background: COLORS.nearBlack }}>Just planning ahead</option>
                  </select>
                </div>
              </div>

              {/* Submit */}
              <div style={{ paddingTop: "1rem" }}>
                <button
                  onClick={handleSubmit}
                  style={{
                    background: COLORS.magenta, color: COLORS.nearBlack,
                    fontFamily: "\'Anton\', Impact, sans-serif",
                    fontSize: "1rem", letterSpacing: "0.1em",
                    textTransform: "uppercase", padding: "1.2rem 3.5rem",
                    border: "none", cursor: "pointer",
                    transition: "transform 0.2s, box-shadow 0.2s",
                  }}
                  onMouseEnter={e => { e.target.style.transform = "translate(-3px,-3px)"; e.target.style.boxShadow = `5px 5px 0 ${COLORS.offWhite}`; }}
                  onMouseLeave={e => { e.target.style.transform = "none"; e.target.style.boxShadow = "none"; }}
                >Send It →</button>
                <p style={{
                  fontFamily: "Georgia, serif", fontSize: "0.78rem",
                  fontStyle: "italic", color: "#B3A6A7",
                  marginTop: "1rem",
                }}>I respond to every inquiry personally within 48 hours.</p>
              </div>
            </div>
          </FadeIn>
        )}
      </div>
    </section>
  );
}

  return (
    <footer style={{
      background: COLORS.nearBlack, padding: "2.5rem 4rem",
      display: "flex", justifyContent: "space-between", alignItems: "center",

    }}>
      <div style={{ fontFamily: "\'Anton\', Impact, sans-serif", fontSize: "0.95rem", letterSpacing: "0.1em", textTransform: "uppercase", color: COLORS.offWhite }}>Shannon Reibenstein Co.</div>

    function useInView(t=0.1){
      const ref=useRef(null);
      const [v,setV]=useState(false);
      useEffect(()=>{
        const o=new IntersectionObserver(([e])=>{if(e.isIntersecting)setV(true)},{threshold:t});
        if(ref.current)o.observe(ref.current);
        return()=>o.disconnect();
      },[]);
      return [ref,v];
    }

    function FadeIn({children,delay=0,style={}}){
      const [ref,v]=useInView();
      return <div ref={ref} style={{opacity:v?1:0,transform:v?"translateY(0)":"translateY(24px)",transition:`opacity .8s ease ${delay}s,transform .8s ease ${delay}s`,...style}}>{children}</div>;
    }

      },[]);
      return(
        <nav style={{position:"fixed",top:0,left:0,right:0,zIndex:100,padding:"1.2rem 4rem",display:"flex",justifyContent:"space-between",alignItems:"center",background:s?`${C.nearBlack}f0`:"transparent",backdropFilter:s?"blur(16px)":"none",borderBottom:s?`1px solid ${C.magenta}30`:"none",transition:"all .4s ease"}}>
          <div style={{fontFamily:"'Anton',Impact,sans-serif",fontSize:"1rem",letterSpacing:"0.1em",textTransform:"uppercase",color:C.offWhite}}>Shannon Reibenstein Co.</div>
          <div style={{display:"flex",gap:"2.5rem",alignItems:"center"}}>
            {["Home","About","Work","Offers"].map(i=>{const navMap={"Home":"/","About":"/about","Work":"/work","Offers":"/offers"};return(
              <a key={i} href={navMap[i]||"#"} style={{fontFamily:"Georgia,serif",fontSize:"0.85rem",color:C.warmGray,textDecoration:"none",letterSpacing:"0.04em",transition:"color .2s"}}
                onMouseEnter={e=>e.target.style.color=C.magenta}
                onMouseLeave={e=>e.target.style.color=C.warmGray}
              >{i}</a>
            ))}
            <a href="/offers#inquiry" style={{fontFamily:"Georgia,serif",fontSize:"0.85rem",color:C.magenta,textDecoration:"none",fontStyle:"italic",borderBottom:`1px solid ${C.magenta}`,paddingBottom:"1px"}}>Let's Talk</a>
          </div>
        </nav>
      );
    }

    function Hero(){
      const [m,setM]=useState(false);
      useEffect(()=>{setTimeout(()=>setM(true),120);},[]);
      return(
        <section style={{minHeight:"60vh",background:C.nearBlack,display:"flex",flexDirection:"column",justifyContent:"center",padding:"9rem 4rem 5rem",position:"relative",overflow:"hidden"}}>
          <div style={{position:"absolute",top:0,left:"4rem",width:"2px",height:m?"50%":"0%",background:`linear-gradient(to bottom,${C.magenta},transparent)`,transition:"height 1.6s ease .3s"}}/>
          <div style={{position:"absolute",right:"-2rem",bottom:"-4rem",fontFamily:"'Anton',Impact,sans-serif",fontSize:"26vw",color:`${C.magenta}06`,lineHeight:1,userSelect:"none",pointerEvents:"none"}}>F</div>
          <div style={{maxWidth:"900px",position:"relative",zIndex:2}}>
            <div style={{opacity:m?1:0,transform:m?"none":"translateY(12px)",transition:"all .6s ease .3s",fontFamily:"Georgia,serif",fontSize:"0.75rem",letterSpacing:"0.22em",textTransform:"uppercase",color:C.magentaSoft,fontStyle:"italic",marginBottom:"1.5rem"}}>Shannon Reibenstein Co.</div>
            <h1 style={{fontFamily:"'Anton',Impact,sans-serif",fontSize:"clamp(4rem,9vw,10rem)",lineHeight:0.88,textTransform:"uppercase",color:C.offWhite,margin:"0 0 2rem 0"}}>
              {[
                {t:"Field",c:C.offWhite,d:"0.35s"},
                {t:"Notes.",c:C.magenta,d:"0.5s"},
              ].map(({t,c,d})=>(
                <span key={t} style={{display:"block",color:c,opacity:m?1:0,transform:m?"none":"translateY(20px)",transition:`all .7s ease ${d}`}}>{t}</span>
              ))}
            </h1>
            <p style={{opacity:m?1:0,transform:m?"none":"translateY(16px)",transition:"all .7s ease .7s",fontFamily:"Georgia,serif",fontSize:"1.05rem",lineHeight:1.75,color:C.warmGray,maxWidth:"520px",borderLeft:`2px solid ${C.magenta}`,paddingLeft:"1.5rem"}}>
              Dispatches from a Possibilitarian. Brand thinking, industry commentary, and the funky combinations in between. Active observations from someone doing the work in real time.
            </p>
          </div>
        </section>
      );
    }

    function FeaturedPost({post}){
      const [hover,setHover]=useState(false);
      return(
        <section style={{background:C.navy,padding:"0"}}>
          <FadeIn>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",minHeight:"70vh",cursor:"pointer"}}
              onMouseEnter={()=>setHover(true)}
              onMouseLeave={()=>setHover(false)}
            >
              {/* Image */}
              <div style={{position:"relative",overflow:"hidden"}}>
                <img src={post.img} alt={post.title}
                  style={{width:"100%",height:"100%",objectFit:"cover",display:"block",transition:"transform .6s ease",transform:hover?"scale(1.03)":"scale(1)"}}
                />
                <div style={{position:"absolute",inset:0,background:`linear-gradient(to right,transparent 60%,${C.navy})`,pointerEvents:"none"}}/>
                <div style={{position:"absolute",top:"2rem",left:"2rem",background:C.magenta,padding:"0.4rem 1rem",fontFamily:"'Anton',Impact,sans-serif",fontSize:"0.75rem",letterSpacing:"0.12em",textTransform:"uppercase",color:C.nearBlack}}>
                  Featured
                </div>
              </div>
              {/* Text */}
              <div style={{display:"flex",flexDirection:"column",justifyContent:"center",padding:"6rem 5rem 6rem 4rem"}}>
                <div style={{fontFamily:"Georgia,serif",fontSize:"0.72rem",letterSpacing:"0.15em",textTransform:"uppercase",color:C.magentaSoft,fontStyle:"italic",marginBottom:"1rem"}}>{post.category}</div>
                <h2 style={{fontFamily:"'Anton',Impact,sans-serif",fontSize:"clamp(1.8rem,3vw,3rem)",textTransform:"uppercase",color:C.offWhite,margin:"0 0 1.5rem 0",lineHeight:1.05,transition:"color .2s",color:hover?C.magenta:C.offWhite}}>{post.title}</h2>
                <p style={{fontFamily:"Georgia,serif",fontSize:"1rem",lineHeight:1.8,color:C.warmGray,margin:"0 0 2.5rem 0"}}>{post.excerpt}</p>
                <div style={{display:"flex",alignItems:"center",gap:"2rem",marginBottom:"2rem"}}>
                  <span style={{fontFamily:"Georgia,serif",fontSize:"0.78rem",color:C.warmGray,fontStyle:"italic"}}>{post.date}</span>
                  <span style={{width:"1px",height:"12px",background:`${C.warmGray}44`}}/>
                  <span style={{fontFamily:"Georgia,serif",fontSize:"0.78rem",color:C.warmGray,fontStyle:"italic"}}>{post.readTime}</span>
                </div>
                <div style={{display:"flex",flexWrap:"wrap",gap:"0.5rem",marginBottom:"2.5rem"}}>
                  {post.tags.map(tag=>(
                    <span key={tag} style={{fontFamily:"Georgia,serif",fontSize:"0.7rem",letterSpacing:"0.1em",textTransform:"uppercase",color:C.magentaSoft,border:`1px solid ${C.magentaSoft}44`,padding:"0.3rem 0.8rem"}}>{tag}</span>
                  ))}
                </div>
                <a href={`#post-${post.id}`} style={{display:"inline-flex",alignItems:"center",gap:"0.8rem",fontFamily:"'Anton',Impact,sans-serif",fontSize:"0.9rem",letterSpacing:"0.1em",textTransform:"uppercase",color:C.magenta,textDecoration:"none",borderBottom:`1px solid ${C.magenta}`,paddingBottom:"2px",alignSelf:"flex-start",transition:"gap .2s"}}>
                  Read the Field Note <span style={{transition:"transform .2s",transform:hover?"translateX(4px)":"none"}}>→</span>
                </a>
              </div>
            </div>
          </FadeIn>
        </section>
      );
    }

    function PostCard({post,index}){
      const [hover,setHover]=useState(false);
      const isComingSoon = post.date === "Coming Soon";
      return(
        <FadeIn delay={index*0.08}>
          <div style={{background:C.offWhite,cursor:isComingSoon?"default":"pointer",transition:"transform .2s",transform:hover&&!isComingSoon?"translateY(-4px)":"none",opacity:isComingSoon?0.75:1}}
            onMouseEnter={()=>setHover(true)}
            onMouseLeave={()=>setHover(false)}
          >
            {/* Cover image */}
            <div style={{position:"relative",overflow:"hidden",height:"240px"}}>
              <img src={post.img} alt={post.title}
                style={{width:"100%",height:"100%",objectFit:"cover",display:"block",transition:"transform .5s ease",transform:hover&&!isComingSoon?"scale(1.05)":"scale(1)",filter:isComingSoon?"grayscale(30%)":"none"}}
              />
              <div style={{position:"absolute",inset:0,background:`linear-gradient(to top,${C.nearBlack}88,transparent)`,pointerEvents:"none"}}/>
              {isComingSoon && (
                <div style={{position:"absolute",top:"1rem",right:"1rem",background:`${C.nearBlack}cc`,padding:"0.3rem 0.8rem",fontFamily:"Georgia,serif",fontSize:"0.68rem",letterSpacing:"0.1em",textTransform:"uppercase",color:C.warmGray,fontStyle:"italic"}}>Coming Soon</div>
              )}
              <div style={{position:"absolute",bottom:"1rem",left:"1rem",fontFamily:"Georgia,serif",fontSize:"0.68rem",letterSpacing:"0.12em",textTransform:"uppercase",color:C.magentaSoft,fontStyle:"italic"}}>{post.category}</div>
            </div>
            {/* Content */}
            <div style={{padding:"2rem"}}>
              <h3 style={{fontFamily:"'Anton',Impact,sans-serif",fontSize:"1.15rem",textTransform:"uppercase",letterSpacing:"0.02em",color:hover&&!isComingSoon?C.magentaDeep:C.nearBlack,margin:"0 0 1rem 0",lineHeight:1.15,transition:"color .2s"}}>{post.title}</h3>
              <p style={{fontFamily:"Georgia,serif",fontSize:"0.88rem",lineHeight:1.7,color:`${C.nearBlack}88`,margin:"0 0 1.5rem 0"}}>{post.excerpt}</p>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",borderTop:`1px solid ${C.navy}15`,paddingTop:"1rem"}}>
                <div style={{display:"flex",gap:"1rem",alignItems:"center"}}>
                  <span style={{fontFamily:"Georgia,serif",fontSize:"0.72rem",color:`${C.nearBlack}55`,fontStyle:"italic"}}>{post.readTime}</span>
                </div>
                <div style={{display:"flex",flexWrap:"wrap",gap:"0.4rem",justifyContent:"flex-end"}}>
                  {post.tags.slice(0,2).map(tag=>(
                    <span key={tag} style={{fontFamily:"Georgia,serif",fontSize:"0.62rem",letterSpacing:"0.08em",textTransform:"uppercase",color:C.magentaDeep,border:`1px solid ${C.magentaDeep}33`,padding:"0.2rem 0.6rem"}}>{tag}</span>
                  ))}
                </div>
              </div>
            </div>
          </div>
        </FadeIn>
      );
    }

    function PostGrid({posts,activeCategory}){
      const filtered = activeCategory==="All" ? posts.filter(p=>!p.featured) : posts.filter(p=>p.category===activeCategory&&!p.featured);
      return(
        <section style={{background:C.lightLilac,padding:"9rem 4rem"}}>
          <div style={{maxWidth:"1200px",margin:"0 auto"}}>
            <FadeIn>
              <div style={{display:"flex",alignItems:"baseline",gap:"1.5rem",marginBottom:"5rem"}}>
                <span style={{fontFamily:"Georgia,serif",fontSize:"0.75rem",letterSpacing:"0.2em",textTransform:"uppercase",color:C.magentaDeep,fontStyle:"italic"}}>All Field Notes</span>
                <div style={{flex:1,height:"1px",background:`${C.navy}22`}}/>
              </div>
            </FadeIn>
            {filtered.length===0?(
              <FadeIn>
                <div style={{textAlign:"center",padding:"6rem 0"}}>
                  <p style={{fontFamily:"Georgia,serif",fontSize:"1rem",fontStyle:"italic",color:`${C.nearBlack}55`}}>No notes in this category yet. Check back soon.</p>
                </div>
              </FadeIn>
            ):(
              <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:"2px",background:`${C.navy}11`}}>
                {filtered.map((post,i)=><PostCard key={post.id} post={post} index={i}/>)}
              </div>
            )}
          </div>
        </section>
      );
    }

    function CategoryFilter({active,setActive}){
      return(
        <section style={{background:C.offWhite,padding:"3rem 4rem 0"}}>
          <div style={{maxWidth:"1200px",margin:"0 auto",display:"flex",gap:"0.5rem",flexWrap:"wrap"}}>
            {CATEGORIES.map(cat=>(
              <button key={cat}
                onClick={()=>setActive(cat)}
                style={{fontFamily:"Georgia,serif",fontSize:"0.8rem",letterSpacing:"0.1em",textTransform:"uppercase",padding:"0.6rem 1.4rem",border:`1px solid ${active===cat?C.magenta:`${C.navy}33`}`,background:active===cat?C.magenta:"transparent",color:active===cat?C.nearBlack:`${C.nearBlack}77`,cursor:"pointer",transition:"all .2s",fontStyle:active===cat?"normal":"italic"}}
              >{cat}</button>
            ))}
          </div>
        </section>
      );
    }

    function Newsletter(){
      const [email,setEmail]=useState("");
      const [done,setDone]=useState(false);
      return(
        <section style={{background:C.deepPurple,padding:"9rem 4rem",position:"relative",overflow:"hidden"}}>
          <div style={{position:"absolute",right:"-3rem",bottom:"-5rem",fontFamily:"'Anton',Impact,sans-serif",fontSize:"22vw",color:`${C.magenta}08`,lineHeight:1,userSelect:"none",pointerEvents:"none"}}>N</div>
          <div style={{maxWidth:"700px",margin:"0 auto",position:"relative",zIndex:2,textAlign:"center"}}>
            <FadeIn>
              <p style={{fontFamily:"Georgia,serif",fontSize:"0.75rem",letterSpacing:"0.2em",textTransform:"uppercase",color:C.magentaSoft,fontStyle:"italic",marginBottom:"2rem"}}>Stay in the field</p>
            </FadeIn>
            <FadeIn delay={0.1}>
              <h2 style={{fontFamily:"'Anton',Impact,sans-serif",fontSize:"clamp(2.5rem,5vw,5.5rem)",lineHeight:0.92,textTransform:"uppercase",color:C.offWhite,margin:"0 0 1.5rem 0"}}>
                Get Field Notes<br/><span style={{color:C.magenta}}>In Your Inbox.</span>
              </h2>
            </FadeIn>
            <FadeIn delay={0.2}>
              <p style={{fontFamily:"Georgia,serif",fontSize:"1rem",lineHeight:1.75,color:C.warmGray,margin:"0 0 3rem 0"}}>
                New dispatches when I have something worth saying. No promotional calendar. No content for the sake of content. Just the thinking — when it's ready.
              </p>
            </FadeIn>
            <FadeIn delay={0.3}>
              {done?(
                <div style={{padding:"2rem",borderLeft:`3px solid ${C.magenta}`,textAlign:"left",background:`${C.nearBlack}40`}}>
                  <div style={{fontFamily:"'Anton',Impact,sans-serif",fontSize:"1.5rem",textTransform:"uppercase",color:C.magenta,marginBottom:"0.5rem"}}>You're in.</div>
                  <p style={{fontFamily:"Georgia,serif",fontSize:"0.95rem",lineHeight:1.7,color:C.warmGray,margin:0}}>First dispatch coming when I have something worth saying. Which shouldn't be long.</p>
                </div>
              ):(
                <div style={{display:"flex",gap:"0",maxWidth:"500px",margin:"0 auto"}}>
                  <input type="email" placeholder="Your email address" value={email} onChange={e=>setEmail(e.target.value)}
                    style={{flex:1,padding:"1rem 1.2rem",background:`${C.nearBlack}60`,border:`1px solid ${C.magenta}40`,borderRight:"none",color:C.offWhite,fontFamily:"Georgia,serif",fontSize:"0.95rem",outline:"none"}}
                    onFocus={e=>e.target.style.borderColor=C.magenta}
                    onBlur={e=>e.target.style.borderColor=`${C.magenta}40`}
                  />
                  <button onClick={()=>{if(email)setDone(true);}}
                    style={{background:C.magenta,color:C.nearBlack,fontFamily:"'Anton',Impact,sans-serif",fontSize:"0.85rem",letterSpacing:"0.1em",textTransform:"uppercase",padding:"1rem 2rem",border:"none",cursor:"pointer",whiteSpace:"nowrap",transition:"background .2s"}}
                    onMouseEnter={e=>e.target.style.background=C.magentaSoft}
                    onMouseLeave={e=>e.target.style.background=C.magenta}
                  >Send It</button>
                </div>
              )}
              <p style={{fontFamily:"Georgia,serif",fontSize:"0.72rem",fontStyle:"italic",color:C.warmGray,marginTop:"1rem",opacity:0.6}}>No spam. Unsubscribe any time. Obviously.</p>
            </FadeIn>
          </div>
        </section>
      );
    }

    function Footer(){
      return(
        <footer style={{background:C.nearBlack,padding:"2.5rem 4rem",display:"flex",justifyContent:"space-between",alignItems:"center",borderTop:`1px solid ${C.magenta}20`}}>
          <div style={{fontFamily:"'Anton',Impact,sans-serif",fontSize:"0.95rem",letterSpacing:"0.1em",textTransform:"uppercase",color:C.offWhite}}>Shannon Reibenstein Co.</div>
          <div style={{fontFamily:"Georgia,serif",fontSize:"0.82rem",fontStyle:"italic",color:C.magentaSoft}}>Possibilitarian For Hire</div>
          <div style={{fontFamily:"Georgia,serif",fontSize:"0.72rem",color:C.warmGray,opacity:0.4}}>© 2026 Shannon Reibenstein Co.</div>
        </footer>
      );
    }

    function App(){
      const [activeCategory,setActiveCategory]=useState("All");
      const featured = POSTS.find(p=>p.featured);
      return(
        <div style={{overflowX:"hidden"}}>
          <style>{`
            @import url('https://fonts.googleapis.com/css2?family=Anton&display=swap');
            input::placeholder{color:rgba(254,252,248,0.3);font-style:italic}
          `}</style>
          <Nav/>
          <Hero/>
          {featured && <FeaturedPost post={featured}/>}
          <CategoryFilter active={activeCategory} setActive={setActiveCategory}/>
          <PostGrid posts={POSTS} activeCategory={activeCategory}/>
          <Newsletter/>
          <Footer/>
        </div>
      );
    }

    const root=ReactDOM.createRoot(document.getElementById("root"));
    root.render(React.createElement(App));
  </script>
</body>
</html>

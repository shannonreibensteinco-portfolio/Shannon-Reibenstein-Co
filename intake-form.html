<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Work With Me — Shannon Reibenstein Co.</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{background:#FEFCF8;overflow-x:hidden}
    ::-webkit-scrollbar{width:3px}
    ::-webkit-scrollbar-track{background:#FEFCF8}
    ::-webkit-scrollbar-thumb{background:#FC19E5}
    button{font-family:inherit}
  </style>
  <link rel="canonical" href="https://shannon-reibenstein-co.vercel.app/intake">
  <meta property="og:url" content="https://shannon-reibenstein-co.vercel.app/intake">
  <meta property="og:site_name" content="Shannon Reibenstein Co.">
  <meta name="author" content="Shannon Reibenstein">
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const {useState, useEffect, useRef} = React;

const C = {
  nearBlack:  "#1F1B16",
  navy:       "#2F364C",
  deepPurple: "#532263",
  darkPurple: "#6C0465",
  magenta:    "#FC19E5",
  magentaSoft:"#fe66c4",
  magentaDeep:"#9e1460",
  offWhite:   "#FEFCF8",
  warmGray:   "#B3A6A7",
  lightLilac: "#f5eef8",
};

const FEELINGS = [
  {
    id: "power",
    label: "Power & Inevitability",
    sub: "Like encountering something that was always going to exist",
    influence: "Constructivism",
  },
  {
    id: "thoughtful",
    label: "Considered & Principled",
    sub: "Like someone thought about this more carefully than anyone else",
    influence: "De Stijl / Suprematism",
  },
  {
    id: "unnamed",
    label: "Something They Can't Immediately Name",
    sub: "A feeling before a thought — curiosity, unease, wonder",
    influence: "Expressionism / Surrealist Collage",
  },
  {
    id: "rare",
    label: "Like They Found Something Rare",
    sub: "The opposite of mass-produced — specific, intentional, earned",
    influence: "Arte Povera / Editorial Modernism",
  },
  {
    id: "questioned",
    label: "Like the Category Is Being Questioned",
    sub: "Wait — why does everyone in this space look the same?",
    influence: "Pop Art / Fluxus",
  },
  {
    id: "lasting",
    label: "Built to Last",
    sub: "Craft is visible. Nothing is accidental. This will still be true in ten years.",
    influence: "Bauhaus",
  },
];

const BUDGETS = [
  "Under $2,000",
  "$2,000 – $5,000",
  "$5,000 – $10,000",
  "$10,000 – $20,000",
  "$20,000+",
  "Flexible — let's talk",
];

const TIMELINES = [
  "As soon as possible",
  "Within 1 month",
  "1 – 3 months",
  "3 – 6 months",
  "Just planning ahead",
];

function Label({ children, required }) {
  return (
    <div style={{
      fontFamily: "Georgia, serif",
      fontSize: "0.72rem",
      letterSpacing: "0.15em",
      textTransform: "uppercase",
      color: C.magentaSoft,
      display: "block",
      marginBottom: "0.6rem",
    }}>
      {children}{required && <span style={{ color: C.magenta, marginLeft: "0.3rem" }}>*</span>}
    </div>
  );
}

const inputBase = {
  width: "100%",
  padding: "1rem 1.2rem",
  background: `${C.navy}40`,
  border: `1px solid ${C.magenta}30`,
  color: C.offWhite,
  fontFamily: "Georgia, serif",
  fontSize: "0.95rem",
  outline: "none",
  transition: "border-color 0.2s",
  lineHeight: 1.5,
};

function App() {
  const [form, setForm] = useState({
    name: "", email: "",
    brandSentence: "", frustration: "",
    feeling: "", budget: "", timeline: "",
  });
  const [submitted, setSubmitted] = useState(false);

  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));
  const focus = e => e.target.style.borderColor = C.magenta;
  const blur  = e => e.target.style.borderColor = `${C.magenta}30`;

  const handleSubmit = () => {
    if (form.name && form.email && form.brandSentence) setSubmitted(true);
  };

  if (submitted) return (
    <section id="inquiry" style={{ background: C.nearBlack, padding: "9rem 4rem" }}>
      <div style={{ maxWidth: "800px", margin: "0 auto", padding: "4rem", background: `${C.navy}60`, borderLeft: `3px solid ${C.magenta}`, textAlign: "center" }}>
        <div style={{ fontFamily: "'Anton', Impact, sans-serif", fontSize: "2.5rem", textTransform: "uppercase", color: C.magenta, marginBottom: "1rem" }}>Got it.</div>
        <p style={{ fontFamily: "Georgia, serif", fontSize: "1.05rem", lineHeight: 1.75, color: C.warmGray, margin: 0 }}>
          I read every submission personally. You'll hear from me within 48 hours — usually sooner.
        </p>
      </div>
    </section>
  );

  return (
    <section id="inquiry" style={{ background: C.nearBlack, padding: "9rem 4rem" }}>
      <style>{`@import url('https://fonts.googleapis.com/css2?family=Anton&display=swap');`}</style>
      <div style={{ maxWidth: "860px", margin: "0 auto" }}>

        {/* Header */}
        <p style={{ fontFamily: "Georgia, serif", fontSize: "0.75rem", letterSpacing: "0.2em", textTransform: "uppercase", color: C.magentaSoft, fontStyle: "italic", marginBottom: "2rem" }}>
          Start the conversation
        </p>
        <h2 style={{ fontFamily: "'Anton', Impact, sans-serif", fontSize: "clamp(2.5rem, 5vw, 5.5rem)", lineHeight: 0.92, textTransform: "uppercase", color: C.offWhite, margin: "0 0 1.5rem 0" }}>
          Tell Me<br />About Your<br /><span style={{ color: C.magenta }}>Brand.</span>
        </h2>
        <p style={{ fontFamily: "Georgia, serif", fontSize: "1rem", lineHeight: 1.75, color: C.warmGray, margin: "0 0 4rem 0", borderLeft: `2px solid ${C.magenta}30`, paddingLeft: "1.5rem" }}>
          No pitch decks. No portfolio reviews before we talk. Just tell me what's happening and let's figure out together whether we're the right fit. One of these questions is about art history — answer it honestly, not correctly.
        </p>

        <div style={{ display: "flex", flexDirection: "column", gap: "2.5rem" }}>

          {/* Name + Email */}
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "1.5rem" }}>
            <div>
              <Label required>Your Name</Label>
              <input type="text" placeholder="First and last" value={form.name}
                onChange={e => set("name", e.target.value)}
                style={inputBase} onFocus={focus} onBlur={blur}
              />
            </div>
            <div>
              <Label required>Your Email</Label>
              <input type="email" placeholder="Where to reach you" value={form.email}
                onChange={e => set("email", e.target.value)}
                style={inputBase} onFocus={focus} onBlur={blur}
              />
            </div>
          </div>

          {/* Brand sentence */}
          <div>
            <Label required>Tell me about your brand in one sentence</Label>
            <input type="text"
              placeholder="Don't overthink it — the first honest thing that comes to mind"
              value={form.brandSentence}
              onChange={e => set("brandSentence", e.target.value)}
              style={inputBase} onFocus={focus} onBlur={blur}
            />
          </div>

          {/* THE NEW QUESTION — Art direction / feeling */}
          <div>
            <Label>What do you want someone to feel in the first three seconds — before they've read a single word?</Label>
            <p style={{ fontFamily: "Georgia, serif", fontSize: "0.82rem", fontStyle: "italic", color: C.warmGray, marginBottom: "1.2rem", lineHeight: 1.6 }}>
              This isn't a trick question. There's no wrong answer. It tells me which visual world your brand actually belongs in.
            </p>
            <div style={{ display: "flex", flexDirection: "column", gap: "2px", background: `${C.magenta}10` }}>
              {FEELINGS.map(f => {
                const selected = form.feeling === f.id;
                return (
                  <div key={f.id}
                    onClick={() => set("feeling", f.id)}
                    style={{
                      display: "grid",
                      gridTemplateColumns: "24px 1fr auto",
                      gap: "1.2rem",
                      alignItems: "center",
                      padding: "1.2rem 1.5rem",
                      background: selected ? `${C.magenta}12` : C.nearBlack,
                      borderLeft: `3px solid ${selected ? C.magenta : "transparent"}`,
                      cursor: "pointer",
                      transition: "all 0.2s",
                    }}
                    onMouseEnter={e => { if (!selected) e.currentTarget.style.background = `${C.navy}60`; }}
                    onMouseLeave={e => { if (!selected) e.currentTarget.style.background = C.nearBlack; }}
                  >
                    {/* Radio dot */}
                    <div style={{
                      width: "18px", height: "18px", borderRadius: "50%",
                      border: `2px solid ${selected ? C.magenta : C.warmGray + "66"}`,
                      background: selected ? C.magenta : "transparent",
                      flexShrink: 0, transition: "all 0.2s",
                      display: "flex", alignItems: "center", justifyContent: "center",
                    }}>
                      {selected && <div style={{ width: "6px", height: "6px", borderRadius: "50%", background: C.nearBlack }} />}
                    </div>

                    {/* Label + sub */}
                    <div>
                      <div style={{
                        fontFamily: "'Anton', Impact, sans-serif",
                        fontSize: "0.95rem", textTransform: "uppercase",
                        letterSpacing: "0.04em",
                        color: selected ? C.offWhite : C.warmGray,
                        marginBottom: "0.2rem", transition: "color 0.2s",
                      }}>{f.label}</div>
                      <div style={{
                        fontFamily: "Georgia, serif", fontSize: "0.82rem",
                        fontStyle: "italic",
                        color: selected ? `${C.offWhite}99` : `${C.warmGray}77`,
                        lineHeight: 1.4, transition: "color 0.2s",
                      }}>{f.sub}</div>
                    </div>

                    {/* Art influence tag — reveals on select */}
                    <div style={{
                      opacity: selected ? 1 : 0,
                      transform: selected ? "translateX(0)" : "translateX(8px)",
                      transition: "all 0.3s",
                      fontFamily: "Georgia, serif", fontSize: "0.68rem",
                      letterSpacing: "0.1em", textTransform: "uppercase",
                      color: C.magentaSoft, whiteSpace: "nowrap",
                      border: `1px solid ${C.magentaSoft}44`,
                      padding: "0.25rem 0.7rem",
                    }}>{f.influence}</div>
                  </div>
                );
              })}
            </div>
            {form.feeling && (
              <div style={{
                marginTop: "1rem", padding: "1rem 1.5rem",
                background: `${C.deepPurple}44`,
                borderLeft: `3px solid ${C.magentaSoft}`,
                fontFamily: "Georgia, serif", fontSize: "0.88rem",
                fontStyle: "italic", color: C.warmGray, lineHeight: 1.6,
              }}>
                {form.feeling === "power" && "Constructivism gives brands forward momentum. Think bold diagonals, limited palette, type as weapon. Rodchenko energy."}
                {form.feeling === "thoughtful" && "De Stijl and Suprematism distill everything to essential form. Primary geometry, principled restraint, the confidence of reduction."}
                {form.feeling === "unnamed" && "Expressionism and Surrealist collage create productive discomfort. Two things in the same frame that have no business being there — and somehow the gap between them is where meaning lives."}
                {form.feeling === "rare" && "Arte Povera and Editorial Modernism say: we thought about every detail. Everyday materials elevated. White space as rhetoric. The visible craft of the made thing."}
                {form.feeling === "questioned" && "Pop Art and Fluxus treat attention itself as the medium. The ironic distance between what something is and how it presents. Liquid Death's entire existence."}
                {form.feeling === "lasting" && "Bauhaus marries form and function without apology. Beautiful because it works. Works because it's beautiful. Nothing accidental, nothing decorative for its own sake."}
              </div>
            )}
          </div>

          {/* Frustration */}
          <div>
            <Label>What's the most frustrating thing about your current brand or messaging?</Label>
            <textarea rows={4}
              placeholder="This is where the real conversation starts. Be honest."
              value={form.frustration}
              onChange={e => set("frustration", e.target.value)}
              style={{ ...inputBase, resize: "vertical" }}
              onFocus={focus} onBlur={blur}
            />
          </div>

          {/* Budget + Timeline */}
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "1.5rem" }}>
            <div>
              <Label>Approximate Budget Range</Label>
              <select value={form.budget} onChange={e => set("budget", e.target.value)}
                style={{ ...inputBase, cursor: "pointer" }}
                onFocus={focus} onBlur={blur}
              >
                <option value="" style={{ background: C.nearBlack }}>Select a range</option>
                {BUDGETS.map(b => <option key={b} value={b} style={{ background: C.nearBlack }}>{b}</option>)}
              </select>
            </div>
            <div>
              <Label>Ideal Timeline</Label>
              <select value={form.timeline} onChange={e => set("timeline", e.target.value)}
                style={{ ...inputBase, cursor: "pointer" }}
                onFocus={focus} onBlur={blur}
              >
                <option value="" style={{ background: C.nearBlack }}>When do you need this?</option>
                {TIMELINES.map(t => <option key={t} value={t} style={{ background: C.nearBlack }}>{t}</option>)}
              </select>
            </div>
          </div>

          {/* Submit */}
          <div style={{ paddingTop: "1rem" }}>
            <button onClick={handleSubmit}
              style={{
                background: C.magenta, color: C.nearBlack,
                fontFamily: "'Anton', Impact, sans-serif",
                fontSize: "1rem", letterSpacing: "0.1em",
                textTransform: "uppercase", padding: "1.2rem 3.5rem",
                border: "none", cursor: "pointer",
                transition: "transform 0.2s, box-shadow 0.2s",
              }}
              onMouseEnter={e => { e.target.style.transform = "translate(-3px,-3px)"; e.target.style.boxShadow = `5px 5px 0 ${C.offWhite}`; }}
              onMouseLeave={e => { e.target.style.transform = "none"; e.target.style.boxShadow = "none"; }}
            >Send It →</button>
            <p style={{ fontFamily: "Georgia, serif", fontSize: "0.78rem", fontStyle: "italic", color: `${C.warmGray}66`, marginTop: "1rem" }}>
              I respond to every inquiry personally within 48 hours.
            </p>
          </div>

        </div>
      </div>
    </section>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
</html>

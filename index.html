function useInView(threshold = 0.12) {
  const ref = useRef(null);
  const [inView, setInView] = useState(false);
  useEffect(() => {
    const observer = new IntersectionObserver(
      ([entry]) => { if (entry.isIntersecting) setInView(true); },
      { threshold }
    );
    if (ref.current) observer.observe(ref.current);
    return () => observer.disconnect();
  }, []);
  return [ref, inView];
}

function FadeIn({ children, delay = 0, style = {} }) {
  const [ref, inView] = useInView();
  return (
    <div ref={ref} style={{
      opacity: inView ? 1 : 0,
      transform: inView ? "translateY(0)" : "translateY(28px)",
      transition: `opacity 0.85s ease ${delay}s, transform 0.85s ease ${delay}s`,
      ...style,
    }}>
      {children}
    </div>
  );
}

function Nav() {
  const [scrolled, setScrolled] = useState(false);
  useEffect(() => {
    const h = () => setScrolled(window.scrollY > 50);
    window.addEventListener("scroll", h);
    return () => window.removeEventListener("scroll", h);
  }, []);
  return (
    <nav style={{
      position: "fixed", top: 0, left: 0, right: 0, zIndex: 100,
      padding: "1.2rem 4rem",
      display: "flex", justifyContent: "space-between", alignItems: "center",
      background: scrolled ? `${COLORS.nearBlack}f0` : "transparent",
      backdropFilter: scrolled ? "blur(16px)" : "none",
      borderBottom: scrolled ? `1px solid ${COLORS.magenta}30` : "none",
      transition: "all 0.4s ease",
    }}>
      <div style={{
        fontFamily: "\'Anton\', Impact, sans-serif",
        fontSize: "1rem", letterSpacing: "0.1em",
        textTransform: "uppercase", color: COLORS.offWhite,
      }}>
        Shannon Reibenstein Co.
      </div>
      <div style={{ display: "flex", gap: "2.5rem", alignItems: "center" }}>
        {["About", "Work", "Offers", "Blog"].map(item => (
          <a key={item} href="#" style={{
            fontFamily: "Georgia, serif", fontSize: "0.85rem",
            color: "#FEFCF8", textDecoration: "none",
            letterSpacing: "0.04em", transition: "color 0.2s",
          }}
            onMouseEnter={e => e.target.style.color = COLORS.magenta}
            onMouseLeave={e => e.target.style.color = "#d8dce6"}
          >{item}</a>
        ))}
        <a href="#" style={{
          fontFamily: "Georgia, serif", fontSize: "0.85rem",
          color: COLORS.magenta, textDecoration: "none",

    function useInView(t = 0.1) {
      const ref = useRef(null);
      const [v, setV] = useState(false);
      useEffect(() => {
        const o = new IntersectionObserver(([e]) => { if (e.isIntersecting) setV(true) }, { threshold: t });
        if (ref.current) o.observe(ref.current);
        return () => o.disconnect();
      }, []);
      return [ref, v];
    }

    function FadeIn({ children, delay = 0, style = {} }) {
      const [ref, v] = useInView();
      return <div ref={ref} style={{ opacity: v ? 1 : 0, transform: v ? "translateY(0)" : "translateY(24px)", transition: `opacity .8s ease ${delay}s,transform .8s ease ${delay}s`, ...style }}>{children}</div>;
    }

    function Nav() {
      const [s, setS] = useState(false);
      useEffect(() => {
        const h = () => setS(window.scrollY > 50);
        window.addEventListener("scroll", h);
        return () => window.removeEventListener("scroll", h);
      }, []);
      return (
        <nav style={{ position: "fixed", top: 0, left: 0, right: 0, zIndex: 100, padding: "1.2rem 4rem", display: "flex", justifyContent: "space-between", alignItems: "center", background: s ? `${C.nearBlack}f0` : "transparent", backdropFilter: s ? "blur(16px)" : "none", borderBottom: s ? `1px solid ${C.magenta}30` : "none", transition: "all .4s ease" }}>
          <div style={{ fontFamily: "'Anton',Impact,sans-serif", fontSize: "1rem", letterSpacing: "0.1em", textTransform: "uppercase", color: C.offWhite }}>Shannon Reibenstein Co.</div>
          <div style={{ display: "flex", gap: "2.5rem", alignItems: "center" }}>
            {["Home", "About", "Offers", "Blog"].map(i => {
              const navMap = { "Home": "/", "About": "/about", "Offers": "/offers", "Blog": "/blog" }; return (
                <a key={i} href={navMap[i] || "#"} style={{ fontFamily: "Georgia,serif", fontSize: "0.85rem", color: C.warmGray, textDecoration: "none", letterSpacing: "0.04em", transition: "color .2s" }}
                  onMouseEnter={e => e.target.style.color = C.magenta}
                  onMouseLeave={e => e.target.style.color = C.warmGray}
                >{i}</a>
              )
            })}
            <a href="https://shannon-reibenstein-co.vercel.app/offers#inquiry" style={{ fontFamily: "Georgia,serif", fontSize: "0.85rem", color: C.magenta, textDecoration: "none", fontStyle: "italic", borderBottom: `1px solid ${C.magenta}`, paddingBottom: "1px" }}>Let's Talk</a>
          </div>
        </nav>
      );
    }

    function Hero() {
      const [m, setM] = useState(false);
      useEffect(() => { setTimeout(() => setM(true), 120); }, []);
      return (
        <section style={{ minHeight: "75vh", background: C.nearBlack, display: "flex", flexDirection: "column", justifyContent: "center", padding: "9rem 4rem 6rem", position: "relative", overflow: "hidden" }}>
          <div style={{ position: "absolute", top: 0, left: "4rem", width: "2px", height: m ? "55%" : "0%", background: `linear-gradient(to bottom,${C.magenta},transparent)`, transition: "height 1.6s ease .3s" }} />
          <div style={{ position: "absolute", right: "-3rem", bottom: "-4rem", fontFamily: "'Anton',Impact,sans-serif", fontSize: "28vw", color: `${C.magenta}06`, lineHeight: 1, userSelect: "none", pointerEvents: "none" }}>W</div>
          <div style={{ maxWidth: "900px", position: "relative", zIndex: 2 }}>
            <div style={{ opacity: m ? 1 : 0, transform: m ? "none" : "translateY(12px)", transition: "all .6s ease .3s", fontFamily: "Georgia,serif", fontSize: "0.75rem", letterSpacing: "0.22em", textTransform: "uppercase", color: C.magentaSoft, fontStyle: "italic", marginBottom: "1.8rem" }}>The Work</div>
            <h1 style={{ fontFamily: "'Anton',Impact,sans-serif", fontSize: "clamp(3rem,7vw,8rem)", lineHeight: 0.9, textTransform: "uppercase", color: C.offWhite, margin: "0 0 3rem 0" }}>
              {[
